name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Prepare FFmpeg sidecar (required by Tauri externalBin)
        shell: pwsh
        run: |
          $binDir = "src-tauri/bin"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          $dest = Join-Path $binDir "ffmpeg-x86_64-pc-windows-msvc.exe"
          if (Test-Path $dest) { exit 0 }
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-extract -Force
          $exe = Get-ChildItem -Recurse ffmpeg-extract -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $exe) { throw "ffmpeg.exe not found in downloaded archive" }
          Copy-Item $exe.FullName $dest -Force

      - name: Lint JavaScript
        run: npm run lint

      - name: Test (Rust + validation)
        run: npm run test

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Tauri build
        run: npm run build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanmoji-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7