name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: v1/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            v1/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('v1/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        working-directory: v1
        run: npm install

      - name: Lint JavaScript
        working-directory: v1
        run: npm run lint

      - name: Cargo test
        working-directory: v1
        run: npm run test

      - name: Clippy
        working-directory: v1/src-tauri
        run: cargo clippy -- -D warnings

      - name: Tauri build
        working-directory: v1
        run: npm run build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanmoji-windows-installer
          path: v1/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7