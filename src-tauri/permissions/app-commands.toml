identifier = "allow-app-commands"
description = "Allow all SanMoji Tauri commands"
commands.allow = [
  "get_settings",
  "save_settings",
  "load_project",
  "save_project",
  "relink_video",
  "autosave_draft",
  "load_autosave_draft",
  "get_video_info",
  "prepare_video_preview_path",
  "get_waveform",
  "validate_export",
  "get_system_fonts",
  "generate_ass_preview",
  "export_ass_file",
  "export_srt_file",
  "import_subtitle_file",
